<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Уголок Исследователя — тема наблюдений</title>
    <style>
        body {
            font-family: Verdana, Arial, Helvetica, sans-serif;
            font-size: 12px;
            margin: 10px;
            background-color: #D1D7DC;
            color: #000000;
        }
        a:link, a:visited { color: #0000EE; text-decoration: underline; }
        a:hover { color: #EE0000; text-decoration: none; }

        .forum-wrapper {
            width: 95%;
            margin: 0 auto;
        }

        /* Общая таблица темы (заголовок и информация) */
        .topic-header {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 5px;
        }
        .header-bar {
            background-color: #336699;
            color: #FFFFFF;
            font-weight: bold;
            padding: 6px 8px;
            font-size: 14px;
        }
        .info-bar {
            background: #EAF0F6;
            border-bottom: 1px solid #6699CC;
            padding: 5px;
        }

        /* Каждый пост — отдельная таблица с рамкой */
        .post-table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid #5A7A9A;
            margin-bottom: 5px;
            background-color: #FFFFFF;
        }

        .post-profile {
            width: 140px;
            vertical-align: top;
            padding: 8px;
            border-right: 1px solid #B0C4DE;
        }

        .username {
            font-weight: bold;
            font-size: 13px;
            color: #003366;
        }

        .user-status {
            font-size: 10px;
            color: #2F4F4F;
        }

        .post-message {
            vertical-align: top;
            padding: 8px;
        }

        .post-header {
            border-bottom: 1px solid #B0C4DE;
            padding-bottom: 4px;
            margin-bottom: 8px;
            font-size: 11px;
            color: #444;
        }

        .post-date {
            float: right;
        }

        .post-content {
            font-size: 13px;
            line-height: 1.5;
            word-break: break-word;
        }

        .btn {
            font-family: Verdana, Arial, sans-serif;
            font-size: 11px;
            background-color: #D4D0C8;
            border: 1px solid #003366;
            padding: 3px 8px;
            color: #000000;
            cursor: pointer;
            border-style: outset;
        }
        .btn:active {
            border-style: inset;
            background-color: #C0C0C0;
        }

        .nav-links {
            width: 95%;
            margin: 5px auto;
            font-size: 11px;
        }

        .loading, .error, .empty {
            padding: 20px;
            text-align: center;
            background-color: #F1F1F1;
            border: 1px solid #999;
        }

        #single-post-view {
            display: none;
        }

        .footer {
            width: 95%;
            margin: 15px auto;
            text-align: center;
            font-size: 10px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="nav-links">
    <a href="#">Главная форума</a> &raquo; 
    <a href="#">Дневники наблюдений</a> &raquo; 
    <b>Тема: Хроники необъяснимого</b>
</div>

<div id="posts-list-view" class="forum-wrapper">
    <table class="topic-header">
        <tr>
            <td class="header-bar">
                📡 Уголок Исследователя :: Хроники необъяснимого
            </td>
        </tr>
        <tr>
            <td class="info-bar">
                <b>Сообщений в теме:</b> <span id="post-count">0</span>
                <span style="float:right;">
                    <input type="button" class="btn" id="refresh-btn" value="⟳ Обновить">
                </span>
            </td>
        </tr>
    </table>

    <div id="posts-container">
        <!-- Сообщения будут вставлены сюда как отдельные таблицы -->
        <div class="loading">⚡ Загрузка сообщений...</div>
    </div>
</div>

<div id="single-post-view" class="forum-wrapper">
    <div class="nav-links" style="width:100%; margin:5px 0;">
        <a href="#">Главная форума</a> &raquo; 
        <a href="#" id="back-to-topic-link">Хроники необъяснимого</a> &raquo; 
        <b>Просмотр сообщения</b>
    </div>
    <div id="single-post-container"></div>
    <div style="margin-top:10px;">
        <input type="button" class="btn" id="back-to-list-btn" value="← Вернуться к теме">
    </div>
</div>

<div class="footer">
    Powered by <a href="#">phpBB</a> &copy; 2001, 2005
</div>

<script>
(function() {
    const postsContainer = document.getElementById('posts-container');
    const postCountSpan = document.getElementById('post-count');
    const listView = document.getElementById('posts-list-view');
    const singleView = document.getElementById('single-post-view');
    const backBtn = document.getElementById('back-to-list-btn');
    const backToTopicLink = document.getElementById('back-to-topic-link');
    const refreshBtn = document.getElementById('refresh-btn');
    const singlePostContainer = document.getElementById('single-post-container');

    let allPosts = [];

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function generateSlug(text) {
        return text.toLowerCase()
            .replace(/[^а-яa-z0-9\s]/g, '')
            .trim()
            .replace(/\s+/g, '-')
            .substring(0, 50);
    }

    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            const nextChar = line[i + 1];
            if (char === '"' && !inQuotes) {
                inQuotes = true;
            } else if (char === '"' && inQuotes && nextChar === '"') {
                current += '"';
                i++;
            } else if (char === '"' && inQuotes) {
                inQuotes = false;
            } else if (char === ',' && !inQuotes) {
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current);
        return result;
    }

    function parseCSV(csvText) {
        const lines = csvText.trim().split('\n');
        if (lines.length < 2) return [];

        const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase());
        const dateIdx = headers.indexOf('date');
        const userIdx = headers.indexOf('user');
        const textIdx = headers.indexOf('text');
        const slugIdx = headers.indexOf('slug');

        if (dateIdx === -1 || userIdx === -1 || textIdx === -1) {
            throw new Error('CSV должен содержать колонки date, user, text');
        }

        const posts = [];
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const values = parseCSVLine(line);
            const date = (values[dateIdx] || '').trim().replace(/^"|"$/g, '');
            const user = (values[userIdx] || '').trim().replace(/^"|"$/g, '') || 'Аноним';
            const text = (values[textIdx] || '').trim().replace(/^"|"$/g, '');
            
            let slug = '';
            if (slugIdx !== -1 && values[slugIdx]) {
                slug = values[slugIdx].trim().replace(/^"|"$/g, '');
            } else {
                slug = generateSlug(text);
            }
            posts.push({ id: i-1, date, user, text, slug });
        }
        return posts;
    }

    function renderPostAsTable(post, index) {
        const singleLink = `#/post/${post.slug || post.id}`;
        return `
            <table class="post-table">
                <tr>
                    <td class="post-profile">
                        <div class="username">${escapeHtml(post.user)}</div>
                        <div class="user-status">Исследователь</div>
                    </td>
                    <td class="post-message">
                        <div class="post-header">
                            <span>#${index+1}</span>
                            <span class="post-date">${escapeHtml(post.date)}</span>
                            <a href="${singleLink}" style="margin-left:8px; font-size:10px;">🔗</a>
                        </div>
                        <div class="post-content">${escapeHtml(post.text)}</div>
                    </td>
                </tr>
            </table>
        `;
    }

    function renderSinglePostAsTable(post) {
        return `
            <table class="post-table">
                <tr>
                    <td class="post-profile">
                        <div class="username">${escapeHtml(post.user)}</div>
                        <div class="user-status">Исследователь</div>
                    </td>
                    <td class="post-message">
                        <div class="post-header">
                            <span>Сообщение</span>
                            <span class="post-date">${escapeHtml(post.date)}</span>
                        </div>
                        <div class="post-content">${escapeHtml(post.text)}</div>
                    </td>
                </tr>
            </table>
        `;
    }

    function renderAllPosts(posts) {
        if (!posts.length) {
            postsContainer.innerHTML = '<div class="empty">📭 В теме пока нет сообщений.</div>';
            postCountSpan.textContent = '0';
            return;
        }
        const sorted = [...posts].sort((a, b) => (a.date || '').localeCompare(b.date || ''));
        let html = '';
        sorted.forEach((post, idx) => { html += renderPostAsTable(post, idx); });
        postsContainer.innerHTML = html;
        postCountSpan.textContent = sorted.length;
    }

    function showListView() {
        listView.style.display = 'block';
        singleView.style.display = 'none';
        if (window.location.hash) {
            history.pushState("", document.title, window.location.pathname + window.location.search);
        }
    }

    function showSinglePost(post) {
        if (!post) return;
        singlePostContainer.innerHTML = renderSinglePostAsTable(post);
        listView.style.display = 'none';
        singleView.style.display = 'block';
    }

    function handleHash() {
        const hash = window.location.hash.substring(1);
        if (!hash || hash === '/') {
            showListView();
            return;
        }
        const match = hash.match(/^\/post\/(.+)$/);
        if (!match) {
            showListView();
            return;
        }
        const slugOrId = match[1];
        const post = allPosts.find(p => p.slug === slugOrId || p.id.toString() === slugOrId);
        post ? showSinglePost(post) : showListView();
    }

    async function loadAndRender() {
        postsContainer.innerHTML = '<div class="loading">⚡ Загрузка архива...</div>';
        try {
            const response = await fetch('data.csv');
            if (!response.ok) throw new Error(`Ошибка HTTP: ${response.status}`);
            const csvText = await response.text();
            allPosts = parseCSV(csvText);
            renderAllPosts(allPosts);
            handleHash();
        } catch (err) {
            console.error(err);
            postsContainer.innerHTML = `<div class="error">⚠️ Ошибка загрузки: ${err.message}</div>`;
            postCountSpan.textContent = '0';
        }
    }

    window.addEventListener('hashchange', handleHash);
    if (refreshBtn) refreshBtn.addEventListener('click', async () => { await loadAndRender(); showListView(); });
    if (backBtn) backBtn.addEventListener('click', (e) => { e.preventDefault(); showListView(); });
    if (backToTopicLink) backToTopicLink.addEventListener('click', (e) => { e.preventDefault(); showListView(); });

    loadAndRender();
})();
</script>
</body>
</html>
